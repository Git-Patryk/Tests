<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ściągawka – Angielski – StudyZone</title>
<style>
html{font-size:17px;}
:root{
  --eng:#00b4d8;--pur:#b44fff;--grn:#00c853;
  --card:rgba(18,18,26,.9);--border:rgba(255,255,255,.08);
  --text:#e8e8f0;--muted:#6b6b8a;--bg:#000008;
  --fs:#ff9a9e;--fa:#b44fff;--fv:#00e5ff;--fe:#ffd700;--fn:#ff6b6b;
  --cpres:#00b4d8;--cpast:#ff7043;--cfut:#b44fff;--cext:#00c853;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#stars-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,8,.7) 100%);pointer-events:none;z-index:1;}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;display:flex;align-items:center;gap:1rem;padding:0 1.4rem;background:rgba(0,0,8,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.tb-back{color:var(--muted);text-decoration:none;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;transition:color .2s;}
.tb-back:hover{color:var(--eng);}
.tb-title{font-size:.9rem;font-weight:700;color:#fff;}

/* PAGE */
#page{position:relative;z-index:10;padding:5rem 1.5rem 4rem;max-width:1120px;margin:0 auto;}

/* HEADER */
.page-header{text-align:center;margin-bottom:2rem;}
.page-icon{font-size:2.8rem;margin-bottom:.6rem;filter:drop-shadow(0 0 14px rgba(0,180,216,.8));}
.page-title{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;letter-spacing:-.03em;background:linear-gradient(90deg,#00b4d8,#b44fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.page-sub{font-size:.85rem;color:var(--muted);margin-top:.4rem;}

/* LEGEND */
.legend{display:flex;justify-content:center;flex-wrap:wrap;gap:.6rem 1.4rem;margin:.8rem 0 1.8rem;font-size:.73rem;}
.leg{display:flex;align-items:center;gap:.35rem;color:rgba(232,232,240,.6);}
.leg-dot{width:9px;height:9px;border-radius:50%;}

/* FILTER TABS */
.filter-bar{display:flex;justify-content:center;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem;}
.ftab{padding:.42rem 1.2rem;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--muted);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.05em;text-transform:uppercase;outline:none;}
.ftab:hover{color:#fff;border-color:rgba(255,255,255,.25);}
.ftab.active{color:#fff;}
.ftab[data-g="all"].active   {background:rgba(0,180,216,.12);border-color:rgba(0,180,216,.4);}
.ftab[data-g="present"].active{background:rgba(0,180,216,.12);border-color:rgba(0,180,216,.4);}
.ftab[data-g="past"].active   {background:rgba(255,112,67,.12);border-color:rgba(255,112,67,.4);}
.ftab[data-g="future"].active  {background:rgba(180,79,255,.12);border-color:rgba(180,79,255,.4);}
.ftab[data-g="extra"].active   {background:rgba(0,200,83,.12);border-color:rgba(0,200,83,.4);}

/* GROUP */
.group-section{margin-bottom:2rem;}
.group-section.hidden{display:none;}
.group-heading{font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 0;margin-bottom:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;}
.group-heading::before{content:'';width:10px;height:10px;border-radius:50%;background:var(--gc);}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1rem;}

/* CARD */
.t-card{background:rgba(12,12,24,.82);border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;backdrop-filter:blur(8px);transition:border-color .22s,transform .22s;display:flex;flex-direction:column;}
.t-card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--cc) 30%,transparent);}

.t-head{padding:.85rem 1.2rem .7rem;border-bottom:1px solid rgba(255,255,255,.05);}
.t-name{font-size:1rem;font-weight:800;color:#fff;margin-bottom:.15rem;}
.t-pl{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--cc);}

.t-body{padding:.85rem 1.2rem;flex:1;display:flex;flex-direction:column;gap:.8rem;}

/* STRUCTURE */
.sec-lbl{font-size:.57rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;}
.struct-row{display:flex;align-items:baseline;gap:.3rem;font-size:.8rem;line-height:1.6;flex-wrap:wrap;}
.s-sign{font-size:.68rem;font-weight:800;flex-shrink:0;width:14px;}
.s-sign.p{color:var(--grn);}
.s-sign.n{color:var(--fn);}
.s-sign.q{color:var(--fa);}
.sep{color:var(--muted);font-size:.7rem;}

/* EXAMPLES */
.ex-row{font-size:.8rem;line-height:1.6;display:flex;gap:.4rem;align-items:baseline;}
.e-sign{font-size:.68rem;font-weight:800;flex-shrink:0;width:14px;}
.e-sign.p{color:var(--grn);}
.e-sign.n{color:var(--fn);}
.e-sign.q{color:var(--fa);}
.ex-txt{color:rgba(232,232,240,.8);}

/* WHEN */
.when-item{font-size:.78rem;color:rgba(232,232,240,.68);padding-left:.85rem;position:relative;line-height:1.5;}
.when-item+.when-item{margin-top:.15rem;}
.when-item::before{content:'·';position:absolute;left:0;color:var(--cc);}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.15rem;}
.tag{font-size:.65rem;padding:.15rem .5rem;border-radius:5px;background:color-mix(in srgb,var(--cc) 12%,transparent);border:1px solid color-mix(in srgb,var(--cc) 25%,transparent);color:color-mix(in srgb,var(--cc) 85%,#fff);}

/* EXTRA CARD (special layout) */
.extra-table{width:100%;border-collapse:collapse;font-size:.77rem;}
.extra-table tr:not(:last-child) td{padding-bottom:.45rem;}
.extra-table .et-key{color:var(--cc);font-weight:700;white-space:nowrap;padding-right:.7rem;vertical-align:top;padding-top:.05rem;}
.extra-table .et-val{color:rgba(232,232,240,.75);line-height:1.5;}

/* CARD FOOTER */
.t-foot{padding:.55rem 1.2rem;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:.5rem;}
.t-link{flex:1;text-align:center;padding:.38rem .5rem;border-radius:7px;font-size:.7rem;font-weight:700;text-decoration:none;transition:background .18s;border:1px solid rgba(255,255,255,.1);cursor:pointer;}
.t-link:hover{background:rgba(255,255,255,.08);}
.t-link.learn{color:var(--eng);}
.t-link.test{color:var(--pur);}

/* COLOR CODING */
.fs{color:var(--fs);}
.fa{color:var(--fa);}
.fv{color:var(--fv);}
.fe{color:var(--fe);}
.fn{color:var(--fn);}

@media(max-width:620px){
  #page{padding:5rem 1rem 3rem;}
  .cards-grid{grid-template-columns:1fr;}
  .legend{gap:.5rem 1rem;}
}
</style>
</head>

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
const GROUPS = [
  {id:'present', label:'Present', gc:'var(--cpres)'},
  {id:'past',    label:'Past',    gc:'var(--cpast)'},
  {id:'future',  label:'Future',  gc:'var(--cfut)'},
  {id:'extra',   label:'Dodatkowe', gc:'var(--cext)'},
];

const SIGN_MAP = {p:'+', n:'–', q:'?'};

function buildCard(t) {
  const cc = t.color;
  const style = `--cc:${cc};`;

  if (t.type === 'extra') {
    const rows = t.rows.map(r =>
      `<tr><td class="et-key">${r.k}</td><td class="et-val">${r.v}</td></tr>`
    ).join('');
    return `
    <div class="t-card" style="${style}">
      <div class="t-head">
        <div>
          <div class="t-name">${t.name}</div>
          <div class="t-pl">${t.pl}</div>
        </div>
      </div>
      <div class="t-body">
        <table class="extra-table">${rows}</table>
      </div>
      <div class="t-foot">
        <a class="t-link learn" href="english-learn.html" onclick="sessionStorage.setItem('sz_nav','${t.id}')">📖 Nauka</a>
        <a class="t-link test"  href="english-tests.html" onclick="sessionStorage.setItem('sz_tnav','${t.id}')">✏️ Test</a>
      </div>
    </div>`;
  }

  const structHTML = t.struct.map(r =>
    `<div class="struct-row"><span class="s-sign ${r.s}">${SIGN_MAP[r.s]}</span>${r.h}</div>`
  ).join('');

  const exHTML = t.ex.map(r =>
    `<div class="ex-row"><span class="e-sign ${r.s}">${SIGN_MAP[r.s]}</span><span class="ex-txt">${r.h}</span></div>`
  ).join('');

  const whenHTML = t.when.map(w =>
    `<div class="when-item">${w}</div>`
  ).join('');

  const tagsHTML = t.tags.map(tag =>
    `<span class="tag">${tag}</span>`
  ).join('');

  return `
  <div class="t-card" style="${style}">
    <div class="t-head">
      <div>
        <div class="t-name">${t.name}</div>
        <div class="t-pl">${t.pl}</div>
      </div>
    </div>
    <div class="t-body">
      <div>
        <div class="sec-lbl">Budowa</div>
        ${structHTML}
      </div>
      <div>
        <div class="sec-lbl">Przykłady</div>
        ${exHTML}
      </div>
      <div>
        <div class="sec-lbl">Kiedy używać</div>
        ${whenHTML}
      </div>
      <div>
        <div class="sec-lbl">Wyrażenia czasowe</div>
        <div class="tags">${tagsHTML}</div>
      </div>
    </div>
    <div class="t-foot">
      <a class="t-link learn" href="english-learn.html" onclick="sessionStorage.setItem('sz_nav','${t.id}')">📖 Nauka</a>
      <a class="t-link test"  href="english-tests.html" onclick="sessionStorage.setItem('sz_tnav','${t.id}')">✏️ Test</a>
    </div>
  </div>`;
}

function render(filter) {
  const content = document.getElementById('content');
  let html = '';

  GROUPS.forEach(g => {
    if (filter !== 'all' && filter !== g.id) return;
    const items = TENSES.filter(t => t.group === g.id);
    if (!items.length) return;

    const cards = items.map(buildCard).join('');
    html += `
    <div class="group-section" data-group="${g.id}" style="--gc:${g.gc}">
      <div class="group-heading" style="color:${g.gc}">${g.label}</div>
      <div class="cards-grid">${cards}</div>
    </div>`;
  });

  content.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════════════
let activeFilter = 'all';

function setFilter(g) {
  activeFilter = g;
  document.querySelectorAll('.ftab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.g === g);
  });
  render(g);
}

// STARS
// ═══════════════════════════════════════════════════════════════
(function(){
  var c=document.getElementById('stars-canvas'),ctx=c.getContext('2d'),stars=[],W,H;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function make(){stars=[];var n=Math.floor((W*H)/3200);for(var i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,alpha:Math.random()*.7+.2,speed:Math.random()*.008+.003,phase:Math.random()*Math.PI*2,color:Math.random()>.92?'#b4e4ff':Math.random()>.85?'#ffe0f0':'#fff'});}
  var tick=0;
  function draw(){ctx.clearRect(0,0,W,H);tick+=.016;for(var i=0;i<stars.length;i++){var s=stars[i],a=s.alpha*(.55+.45*Math.sin(tick*s.speed*60+s.phase));ctx.save();ctx.globalAlpha=a;var g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.5);g.addColorStop(0,s.color);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=Math.min(a*1.6,1);ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();}requestAnimationFrame(draw);}
  resize();make();draw();
  window.addEventListener('resize',function(){resize();make();});
})();
</script>
