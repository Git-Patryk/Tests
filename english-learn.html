<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nauka – Angielski – StudyZone</title>
<style>
html{font-size:17px;}
:root{
  --eng:#00b4d8;--eng2:#0077b6;--pur:#b44fff;
  --card:rgba(18,18,26,.9);--border:rgba(255,255,255,.08);
  --text:#e8e8f0;--muted:#6b6b8a;--bg:#000008;
  --fs:#ff9a9e;--fa:#b44fff;--fv:#00e5ff;--fe:#ffd700;--fn:#ff6b6b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#stars-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,8,.7) 100%);pointer-events:none;z-index:1;}

/* TOPBAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;display:flex;align-items:center;gap:1rem;
  padding:0 1.2rem;
  background:rgba(0,0,8,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.tb-back{color:var(--muted);text-decoration:none;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;transition:color .2s;}
.tb-back:hover{color:var(--eng);}
.tb-title{font-size:.9rem;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-prog{display:flex;align-items:center;gap:.6rem;white-space:nowrap;}
.tb-prog-text{font-size:.72rem;color:var(--muted);}
.prog-track{width:80px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--eng),var(--pur));border-radius:2px;transition:width .4s;}

/* LAYOUT */
#layout{display:flex;padding-top:56px;min-height:100vh;position:relative;z-index:10;}

/* SIDEBAR */
#sidebar{
  width:260px;flex-shrink:0;
  position:fixed;top:56px;bottom:0;left:0;
  overflow-y:auto;overflow-x:hidden;
  background:rgba(8,8,18,.92);backdrop-filter:blur(8px);
  border-right:1px solid var(--border);
  padding:.8rem 0 2rem;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
.nav-group{margin-bottom:.4rem;}
.nav-group-label{
  font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);padding:.7rem 1.2rem .3rem;display:block;
}
.nav-item{
  display:flex;align-items:center;gap:.65rem;
  padding:.55rem 1.2rem;cursor:pointer;
  font-size:.82rem;color:rgba(232,232,240,.7);
  transition:background .15s,color .15s;
  border-left:2px solid transparent;
  text-decoration:none;
}
.nav-item:hover{background:rgba(0,180,216,.07);color:#fff;}
.nav-item.active{background:rgba(0,180,216,.12);color:var(--eng);border-left-color:var(--eng);}
.nav-item.done{color:rgba(0,180,216,.8);}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);flex-shrink:0;transition:background .2s;}
.nav-item.done .nav-dot{background:var(--eng);}
.nav-item.active .nav-dot{background:var(--eng);box-shadow:0 0 6px var(--eng);}
.nav-icon{font-size:1rem;min-width:2rem;width:2rem;text-align:center;flex-shrink:0;}

/* MAIN */
#main{margin-left:260px;flex:1;padding:2rem 2.5rem 4rem;max-width:calc(100% - 260px);}
#topic-view{
  max-width:740px;margin:0 auto;
  background:rgba(12,12,24,.78);
  border:1px solid rgba(255,255,255,.07);
  border-radius:20px;
  padding:2.2rem 2.4rem;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

/* TOPIC CONTENT */
.t-breadcrumb{font-size:.72rem;color:var(--muted);margin-bottom:1.2rem;letter-spacing:.05em;}
.t-header{margin-bottom:2rem;}
.t-polish{font-size:.8rem;color:var(--eng);letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:.4rem;}
.t-title{font-size:2rem;font-weight:900;color:#fff;letter-spacing:-.03em;margin-bottom:.5rem;}
.t-what{font-size:.95rem;color:rgba(232,232,240,.85);line-height:1.7;}

.t-section{margin-top:1.8rem;}
.t-section-title{
  font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.9rem;padding-bottom:.4rem;
  border-bottom:1px solid var(--border);
}

/* WHEN TO USE */
.when-list{display:flex;flex-direction:column;gap:.6rem;}
.when-item{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:10px;padding:.7rem 1rem;
}
.when-label{font-size:.82rem;font-weight:600;color:#fff;margin-bottom:.25rem;}
.when-ex{font-size:.82rem;color:var(--eng);font-style:italic;}

/* FORMATION */
.formation{display:flex;flex-direction:column;gap:.7rem;margin-bottom:.5rem;}
.f-row{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;}
.f-type{
  width:20px;height:20px;border-radius:50%;font-size:.72rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.f-pos .f-type{background:rgba(0,230,118,.2);color:#00e676;}
.f-neg .f-type{background:rgba(255,107,107,.2);color:#ff6b6b;}
.f-q   .f-type{background:rgba(255,215,0,.2);color:#ffd700;}
.f-parts{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;}
.fp{color:rgba(255,255,255,.4);font-size:.9rem;}
.fs{background:rgba(255,154,158,.15);color:var(--fs);padding:.15rem .5rem;border-radius:5px;font-size:.82rem;font-weight:600;}
.fa{background:rgba(180,79,255,.15);color:var(--fa);padding:.15rem .5rem;border-radius:5px;font-size:.82rem;font-weight:600;}
.fv{background:rgba(0,229,255,.15);color:var(--fv);padding:.15rem .5rem;border-radius:5px;font-size:.82rem;font-weight:600;}
.fe{background:rgba(255,215,0,.15);color:var(--fe);padding:.15rem .5rem;border-radius:5px;font-size:.82rem;font-size:.82rem;font-weight:600;}
.fn{background:rgba(255,107,107,.15);color:var(--fn);padding:.15rem .5rem;border-radius:5px;font-size:.82rem;font-weight:600;}
.ft{color:rgba(232,232,240,.7);font-size:.82rem;}

.f-legend{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem;}
.f-legend-item{display:flex;align-items:center;gap:.3rem;font-size:.7rem;color:var(--muted);}
.f-legend-dot{width:8px;height:8px;border-radius:50%;}

.f-note{
  font-size:.8rem;color:rgba(232,232,240,.65);line-height:1.6;
  background:rgba(255,255,255,.03);border-left:2px solid var(--eng);
  padding:.5rem .8rem;border-radius:0 6px 6px 0;margin-top:.4rem;
}

/* MARKERS */
.markers{display:flex;flex-wrap:wrap;gap:.5rem;}
.marker{
  font-size:.75rem;font-style:italic;
  background:rgba(0,180,216,.1);color:var(--eng);
  border:1px solid rgba(0,180,216,.25);
  padding:.2rem .65rem;border-radius:20px;
}

/* EXAMPLES */
.examples{display:flex;flex-direction:column;gap:.55rem;}
.ex-item{
  display:flex;align-items:flex-start;gap:.75rem;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:10px;padding:.65rem .9rem;
}
.ex-badge{
  font-size:.7rem;font-weight:800;width:18px;flex-shrink:0;margin-top:.1rem;
}
.ex-pos .ex-badge{color:#00e676;}
.ex-neg .ex-badge{color:#ff6b6b;}
.ex-q   .ex-badge{color:#ffd700;}
.ex-en{font-size:.88rem;color:#fff;line-height:1.5;}
.ex-pl{font-size:.78rem;color:var(--muted);margin-top:.15rem;}

/* EXTRA SECTION */
.extra-block{
  margin-top:1rem;border-radius:14px;overflow:hidden;
  border:1px solid rgba(180,79,255,.2);
}
.extra-header{
  background:rgba(180,79,255,.1);padding:.75rem 1.1rem;
  font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--pur);display:flex;align-items:center;gap:.5rem;cursor:pointer;
  user-select:none;
}
.extra-header::after{content:'▼';margin-left:auto;font-size:.6rem;transition:transform .2s;}
.extra-block.open .extra-header::after{transform:rotate(180deg);}
.extra-body{
  display:none;padding:1.1rem 1.2rem;
  font-size:.85rem;line-height:1.75;color:rgba(232,232,240,.85);
  background:rgba(8,8,20,.5);
}
.extra-block.open .extra-body{display:block;}
.extra-body strong{color:#fff;}
.extra-body em{color:var(--eng);}
.extra-body .ex-row{margin:.3rem 0;padding:.3rem .6rem;background:rgba(255,255,255,.04);border-radius:6px;font-size:.82rem;}
.extra-body .pos-ex{color:#9effc8;}
.extra-body .neg-ex{color:#ffb3b3;}
.extra-body .q-ex{color:#ffe08a;}
.extra-body table{width:100%;border-collapse:collapse;margin:.6rem 0;font-size:.8rem;}
.extra-body th{background:rgba(180,79,255,.15);color:var(--pur);padding:.4rem .7rem;text-align:left;font-weight:700;}
.extra-body td{padding:.35rem .7rem;border-bottom:1px solid rgba(255,255,255,.05);color:rgba(232,232,240,.8);}
.extra-body td:first-child{color:#fff;}

/* COMPLETE BTN + NAV */
.t-footer{margin-top:2.5rem;display:flex;flex-direction:column;gap:1rem;align-items:flex-start;}
.btn-complete{
  display:flex;align-items:center;gap:.5rem;cursor:pointer;
  background:rgba(0,180,216,.12);border:1px solid rgba(0,180,216,.3);
  color:var(--eng);font-size:.85rem;font-weight:700;letter-spacing:.04em;
  padding:.6rem 1.3rem;border-radius:20px;transition:all .2s;
}
.btn-complete:hover{background:rgba(0,180,216,.22);border-color:var(--eng);}
.btn-complete.done{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.3);color:#00e676;}
.t-nav{display:flex;gap:.8rem;flex-wrap:wrap;}
.btn-nav{
  font-size:.8rem;color:var(--muted);background:rgba(255,255,255,.04);
  border:1px solid var(--border);padding:.5rem 1rem;border-radius:12px;
  cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;
}
.btn-nav:hover{color:#fff;border-color:rgba(255,255,255,.2);}

/* WELCOME SCREEN */
.welcome{text-align:center;padding:4rem 1rem;}
.welcome-icon{font-size:3rem;margin-bottom:1rem;}
.welcome-title{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:.7rem;}
.welcome-text{font-size:.9rem;color:var(--muted);line-height:1.7;max-width:420px;margin:0 auto 1.5rem;}
.legend-box{
  display:inline-flex;flex-wrap:wrap;gap:.5rem;justify-content:center;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;padding:.8rem 1.2rem;margin-bottom:2rem;
}

/* MOBILE */
@media(max-width:768px){
  #sidebar{
    position:fixed;top:56px;left:0;right:0;bottom:auto;
    width:100%;height:auto;max-height:40vh;overflow-y:auto;
    border-right:none;border-bottom:1px solid var(--border);
    display:none;
  }
  #sidebar.mob-open{display:block;}
  #main{margin-left:0;padding:1rem 1rem 3rem;max-width:100%;}
  .mob-menu-btn{
    display:flex;align-items:center;gap:.4rem;
    font-size:.75rem;color:var(--muted);background:none;border:none;cursor:pointer;
    padding:.3rem .5rem;
  }
  .tb-title{display:none;}
}
@media(min-width:769px){.mob-menu-btn{display:none;}}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div id="topbar">
  <a href="english.html" class="tb-back">← Angielski</a>
  <button class="mob-menu-btn" onclick="toggleSidebar()">☰ Tematy</button>
  <span class="tb-title">Nauka gramatyki</span>
  <div class="tb-prog">
    <span class="tb-prog-text" id="prog-text">0 / 0</span>
    <div class="prog-track"><div id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div id="layout">
  <nav id="sidebar"><div id="nav-inner"></div></nav>
  <div id="main"><div id="topic-view"></div></div>
</div>

<script>
/* ── DATA ────────────────────────────────────────────────── */
// TOPICS injected below
/* ── ENGINE ─────────────────────────────────────────────── */
const STORE_KEY = 'sz_eng_progress';
let done = new Set(JSON.parse(localStorage.getItem(STORE_KEY)||'[]'));
let currentId = null;

function saveDone(){ localStorage.setItem(STORE_KEY, JSON.stringify([...done])); }

function updateTopbar(){
  const t = TOPICS.length;
  const d = done.size;
  document.getElementById('prog-text').textContent = d+' / '+t;
  document.getElementById('prog-fill').style.width = (t ? Math.round(d/t*100) : 0)+'%';
}

function buildSidebar(){
  const groups = {
    present:{label:'Czasy teraźniejsze',items:[]},
    past:   {label:'Czasy przeszłe',    items:[]},
    future: {label:'Czasy przyszłe',    items:[]},
    extra:  {label:'Dodatkowe moduły',  items:[]}
  };
  TOPICS.forEach(t=>{ if(groups[t.group]) groups[t.group].items.push(t); });
  let html='';
  for(const [,g] of Object.entries(groups)){
    if(!g.items.length) continue;
    html+=`<div class="nav-group"><span class="nav-group-label">${g.label}</span>`;
    g.items.forEach(t=>{
      const dc=done.has(t.id)?'done':'';
      const ac=currentId===t.id?'active':'';
      html+=`<div class="nav-item ${dc} ${ac}" onclick="navigate('${t.id}')">
        <span class="nav-icon">${t.icon}</span>
        <span style="flex:1">${t.name}</span>
        <span class="nav-dot"></span>
      </div>`;
    });
    html+='</div>';
  }
  document.getElementById('nav-inner').innerHTML=html;
}

function parts(arr){
  return arr.map(p=>{
    if(p.length===1) return `<span class="fp">${p[0]}</span>`;
    const map={s:'fs',a:'fa',v:'fv',e:'fe',n:'fn',t:'ft'};
    return `<span class="${map[p[0]]||'ft'}">${p[1]}</span>`;
  }).join(' ');
}

function renderWhen(items){
  return items.map(i=>`<div class="when-item">
    <div class="when-label">${i[0]}</div>
    <div class="when-ex"><em>${i[1]}</em></div>
  </div>`).join('');
}

function renderExamples(exs){
  return exs.map(e=>{
    const cls=e[0]==='+'?'pos':e[0]==='-'?'neg':'q';
    const badge=e[0]==='?'?'?':e[0];
    const pl=e[2]?`<div class="ex-pl">${e[2]}</div>`:'';
    return `<div class="ex-item ex-${cls}">
      <span class="ex-badge">${badge}</span>
      <div><div class="ex-en">${e[1]}</div>${pl}</div>
    </div>`;
  }).join('');
}

function renderExtra(extras){
  if(!extras||!extras.length) return '';
  return extras.map((ex,i)=>`
    <div class="extra-block" id="ex-${currentId}-${i}">
      <div class="extra-header" onclick="toggleExtra('ex-${currentId}-${i}')">
        <span>📌</span> ${ex.title}
      </div>
      <div class="extra-body">${ex.body}</div>
    </div>`).join('');
}

function toggleExtra(id){
  const el=document.getElementById(id);
  el.classList.toggle('open');
}

function navigate(id){
  const topic=TOPICS.find(t=>t.id===id);
  if(!topic) return;
  currentId=id;
  const idx=TOPICS.indexOf(topic);
  const prev=idx>0?TOPICS[idx-1]:null;
  const next=idx<TOPICS.length-1?TOPICS[idx+1]:null;
  const isDone=done.has(id);

  const f=topic.formation;
  const fHtml=`
    <div class="formation">
      <div class="f-row f-pos"><div class="f-type">+</div><div class="f-parts">${parts(f.pos)}</div></div>
      <div class="f-row f-neg"><div class="f-type">−</div><div class="f-parts">${parts(f.neg)}</div></div>
      <div class="f-row f-q">  <div class="f-type">?</div><div class="f-parts">${parts(f.q)}</div></div>
    </div>
    ${(topic.notes||[]).map(n=>`<div class="f-note">${n}</div>`).join('')}
    <div class="f-legend">
      <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fs)"></div>podmiot</div>
      <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fa)"></div>posiłkowy</div>
      <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fv)"></div>czasownik</div>
      <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fe)"></div>końcówka</div>
    </div>`;

  document.getElementById('topic-view').innerHTML=`
    <div class="t-breadcrumb">${groupLabel(topic.group)} › ${topic.name}</div>
    <div class="t-header">
      <div class="t-polish">${topic.polish}</div>
      <div class="t-title">${topic.name}</div>
      <div class="t-what">${topic.what}</div>
    </div>
    ${topic.when?`<div class="t-section"><div class="t-section-title">Kiedy używamy?</div><div class="when-list">${renderWhen(topic.when)}</div></div>`:''}
    ${f?`<div class="t-section"><div class="t-section-title">Budowa zdania</div>${fHtml}</div>`:''}
    ${topic.markers&&topic.markers.length?`<div class="t-section"><div class="t-section-title">Markery czasowe</div><div class="markers">${topic.markers.map(m=>`<span class="marker">${m}</span>`).join('')}</div></div>`:''}
    <div class="t-section"><div class="t-section-title">Przykłady</div><div class="examples">${renderExamples(topic.examples)}</div></div>
    ${topic.extra?`<div class="t-section"><div class="t-section-title">Powiązane struktury</div>${renderExtra(topic.extra)}</div>`:''}
    <div class="t-footer">
      <button class="btn-complete ${isDone?'done':''}" onclick="toggleDone('${id}')">
        ${isDone?'✓ Ukończono':'○ Oznacz jako ukończone'}
      </button>
      <div class="t-nav">
        ${prev?`<span class="btn-nav" onclick="navigate('${prev.id}')">← ${prev.name}</span>`:''}
        ${next?`<span class="btn-nav" onclick="navigate('${next.id}')">${next.name} →</span>`:''}
      </div>
    </div>`;
  buildSidebar();
  document.getElementById('main').scrollTop=0;
  window.scrollTo(0,0);
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('mob-open');
}

function groupLabel(g){
  return {present:'Teraźniejsze',past:'Przeszłe',future:'Przyszłe',extra:'Dodatkowe'}[g]||g;
}

function toggleDone(id){
  if(done.has(id)) done.delete(id); else done.add(id);
  saveDone(); updateTopbar(); navigate(id);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('mob-open');
}

function showWelcome(){
  document.getElementById('topic-view').innerHTML=`
    <div class="welcome">
      <div class="welcome-icon">📖</div>
      <div class="welcome-title">Witaj w kursie angielskiego</div>
      <div class="welcome-text">Wybierz temat z menu po lewej stronie, aby rozpocząć naukę. Każdy dział zawiera teorię, kolorową budowę zdań i przykłady.</div>
      <div class="legend-box">
        <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fs)"></div>&nbsp;podmiot</div>
        <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fa)"></div>&nbsp;posiłkowy</div>
        <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fv)"></div>&nbsp;czasownik</div>
        <div class="f-legend-item"><div class="f-legend-dot" style="background:var(--fe)"></div>&nbsp;końcówka</div>
      </div>
      <div class="t-nav" style="justify-content:center">
        <span class="btn-nav" onclick="navigate(TOPICS[0].id)">Zacznij od początku →</span>
      </div>
    </div>`;
}

/* ── STARS ───────────────────────────────────────────────── */
(function(){
  var c=document.getElementById('stars-canvas'),ctx=c.getContext('2d'),S=[],W,H;
  function rsz(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function mkS(){S=[];var n=Math.floor(W*H/3200);for(var i=0;i<n;i++)S.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,a:Math.random()*.7+.2,sp:Math.random()*.008+.003,ph:Math.random()*Math.PI*2,cl:Math.random()>.92?'#b4e4ff':Math.random()>.85?'#ffe0f0':'#ffffff'});}
  var tk=0;
  function draw(){ctx.clearRect(0,0,W,H);tk+=.016;for(var i=0;i<S.length;i++){var s=S[i],a=s.a*(.55+.45*Math.sin(tk*s.sp*60+s.ph));ctx.save();ctx.globalAlpha=a;var g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.5);g.addColorStop(0,s.cl);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=Math.min(a*1.6,1);ctx.fillStyle=s.cl;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();}requestAnimationFrame(draw);}
  rsz();mkS();draw();window.addEventListener('resize',function(){rsz();mkS();});
})();
</script>

<table><tr><th>Modal</th><th>Główne znaczenie</th><th>Przykład</th></tr>

<tr><td><strong>might</strong></td><td>mała możliwość, niepewność</td><td><em>She might come later.</em></td></tr>
<tr><td><strong>must</strong></td><td>silna konieczność, logiczny wniosek</td><td><em>You must stop. / He must be tired.</em></td></tr>
<tr><td><strong>have to</strong></td><td>konieczność zewnętrzna (reguły, okoliczności)</td><td><em>I have to wear a uniform.</em></td></tr>
<tr><td><strong>mustn't</strong></td><td>zakaz</td><td><em>You mustn't smoke here.</em></td></tr>
<tr><td><strong>don't have to</strong></td><td>brak konieczności (nie: zakaz!)</td><td><em>You don't have to come.</em></td></tr>
<tr><td><strong>should</strong></td><td>rada, zalecenie</td><td><em>You should rest.</em></td></tr>
<tr><td><strong>would</strong></td><td>prośby, drugi okres warunkowy, przeszłe nawyki</td><td><em>Would you mind? / I would help.</em></td></tr>
</table>`}]
